<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gini Admin Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">

    <nav class="bg-indigo-900 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tight">Gini <span class="text-indigo-300">Admin</span></h1>
            <div class="flex items-center space-x-4">
                <span class="text-xs font-mono bg-indigo-800 px-2 py-1 rounded">V1.0.0</span>
                <button onclick="fetchLoans()" class="bg-indigo-700 hover:bg-indigo-600 px-3 py-1 rounded text-sm transition">Refresh</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto mt-8 px-4">
        <div class="mb-8">
            <h2 class="text-2xl font-semibold text-indigo-900">Pending Loan Approvals</h2>
            <p class="text-gray-500 text-sm">Review applications and CredoLab scores for manual approval.</p>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-100 border-b border-gray-200">
                    <tr>
                        <th class="px-6 py-4 text-xs font-bold uppercase text-gray-600">User</th>
                        <th class="px-6 py-4 text-xs font-bold uppercase text-gray-600">Amount</th>
                        <th class="px-6 py-4 text-xs font-bold uppercase text-gray-600">Credo Score</th>
                        <th class="px-6 py-4 text-xs font-bold uppercase text-gray-600">Date Applied</th>
                        <th class="px-6 py-4 text-xs font-bold uppercase text-gray-600">Actions</th>
                    </tr>
                </thead>
                <tbody id="loan-table-body" class="divide-y divide-gray-100">
                    <!-- Data injected here -->
                    <tr><td colspan="5" class="px-6 py-10 text-center text-gray-400 italic">Loading applications...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        const API_URL = 'http://localhost:5000/api/admin';
        const ADMIN_TOKEN = 'default-admin-secret'; // Should be handled via login in production

        async function fetchLoans() {
            const tableBody = document.getElementById('loan-table-body');
            try {
                const res = await fetch(`${API_URL}/loans`, {
                    headers: { 'AdminToken': ADMIN_TOKEN }
                });
                const loans = await res.json();
                
                if (loans.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="5" class="px-6 py-10 text-center text-gray-400 italic">No pending applications found.</td></tr>';
                    return;
                }

                tableBody.innerHTML = loans.map(loan => `
                    <tr class="hover:bg-gray-50 transition">
                        <td class="px-6 py-4">
                            <div class="text-sm font-semibold text-gray-900">${loan.User.firstName} ${loan.User.lastName}</div>
                            <div class="text-xs text-gray-500">${loan.User.email}</div>
                        </td>
                        <td class="px-6 py-4">
                            <span class="text-sm font-mono font-bold text-indigo-700">${loan.amount} DH</span>
                        </td>
                        <td class="px-6 py-4">
                            <span class="px-2 py-1 rounded-full text-xs font-bold bg-green-100 text-green-700">712 (Mock)</span>
                        </td>
                        <td class="px-6 py-4 text-sm text-gray-500">
                            ${new Date(loan.createdAt).toLocaleDateString()}
                        </td>
                        <td class="px-6 py-4 space-x-2">
                            <button onclick="reviewLoan(${loan.id}, 'approved')" class="bg-green-600 hover:bg-green-700 text-white px-3 py-1 rounded text-xs font-bold transition shadow-sm">Approve</button>
                            <button onclick="reviewLoan(${loan.id}, 'rejected')" class="bg-red-600 hover:bg-red-700 text-white px-3 py-1 rounded text-xs font-bold transition shadow-sm">Reject</button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                tableBody.innerHTML = '<tr><td colspan="5" class="px-6 py-10 text-center text-red-500 italic">Error fetching data. Ensure the server is running on :5000.</td></tr>';
            }
        }

        async function reviewLoan(loanId, status) {
            const adminNotes = prompt(`Enter optional review notes for ${status}:`);
            try {
                const res = await fetch(`${API_URL}/loan/review`, {
                    method: 'POST',
                    headers: { 
                        'AdminToken': ADMIN_TOKEN,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ loanId, status, adminNotes, reviewerId: 1 })
                });
                const result = await res.json();
                alert(result.message);
                fetchLoans();
            } catch (err) {
                alert('Action failed.');
            }
        }

        fetchLoans();
    </script>
</body>
</html>
